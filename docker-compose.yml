# Full-name syntax for podman compatibility
# Usage: podman-compose up --build  OR  docker compose up --build

version: "3.8"

services:
  # ── Redis: Message Broker & Pub/Sub channel ──────────────────────
  redis:
    image: docker.io/library/redis:7-alpine
    container_name: rag-redis
    ports:
      - "6380:6379"
    volumes:
      - rag-redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI: Web API only, never blocks on heavy processing ──────
  rag-app:
    container_name: rag-assistant
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - rag-uploads:/data/uploads
      - rag-chroma:/data/chroma_db
      - rag-db:/data/db
    environment:
      - OLLAMA_BASE_URL=http://192.168.1.92:11434
      - LLM_MODEL=qwen3.5:9b
      - EMBEDDING_MODEL=bge-m3
      - CHROMA_DB_PATH=/data/chroma_db
      - CHROMA_COLLECTION=documents
      - CHUNK_SIZE=1000
      - CHUNK_OVERLAP=200
      - HOST=0.0.0.0
      - PORT=8000
      - UPLOAD_DIR=/data/uploads
      - MAX_FILE_SIZE_MB=50
      - RUNNING_IN_DOCKER=true
      - DB_DATA_PATH=/data/db
      - VISION_MODEL=qwen3-vl:8b
      - VISION_ENABLED=true
      - MEMORY_MAX_MESSAGES=20
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; print(httpx.get('http://localhost:8000/api/health').status_code)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Celery Worker: Heavy lifting — parse, embed, index ───────────
  celery-worker:
    container_name: rag-celery-worker
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.worker worker --loglevel=info --concurrency=2 -Q document_ingestion
    volumes:
      - rag-uploads:/data/uploads
      - rag-chroma:/data/chroma_db
      - rag-db:/data/db
    environment:
      - OLLAMA_BASE_URL=http://192.168.1.92:11434
      - LLM_MODEL=qwen3.5:9b
      - EMBEDDING_MODEL=bge-m3
      - CHROMA_DB_PATH=/data/chroma_db
      - CHROMA_COLLECTION=documents
      - CHUNK_SIZE=1000
      - CHUNK_OVERLAP=200
      - UPLOAD_DIR=/data/uploads
      - MAX_FILE_SIZE_MB=50
      - RUNNING_IN_DOCKER=true
      - DB_DATA_PATH=/data/db
      - VISION_MODEL=qwen3-vl:8b
      - VISION_ENABLED=true
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  rag-uploads:
    name: rag-uploads
  rag-chroma:
    name: rag-chroma
  rag-db:
    name: rag-db
  rag-redis:
    name: rag-redis
